spring.application.name=iam_service
server.servlet.context-path=/

server.port=8189

#Jwt
jwt.secret=akgbskbYpxNe6F9gT+J86YgQP5TIdiufRrewDunIIx4dfYTamoRazdkG8gTLWzKMUSpDRSXELEtGuEXALJS/hA==
jwt.expiration=103600000

#PostgreSQL
spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/post_hub_local
spring.datasource.username=postgres
spring.datasource.password=123qwe
spring.datasource.driver-class-name=org.postgresql.Driver

#Jpa
spring.jpa.properties.hibernate.default_schema=v1_iam_service
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

#Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=v1_iam_service

#End-points strings:
end.points.posts=/posts
end.points.id=/{id}
end.points.create=/create
end.points.all=/all
end.points.search=/search
end.points.users=/users
end.points.auth=/auth
end.points.login=/login
end.points.refresh.token=/refresh/token
end.points.register=/register
end.points.comments=/comments

#Swagger
swagger.servers.first=http://host.docker.internal:8189
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Kafka
kafka.enabled=true
spring.kafka.bootstrap-servers=host.docker.internal:9092
spring.kafka.consumer.group-id=iam_service

additional.kafka.topic.iam.service.logs=iam_topic_for_demo

spring.kafka.listener.ack-mode=manual

spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.compression-type=lz4
spring.kafka.producer.batch-size=50000
spring.kafka.retry.topic.enabled=true

#Logging Level
logging.level.com.post_hub.iam_service=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.flywaydb=DEBUG