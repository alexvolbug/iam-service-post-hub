server.port=8189
server.servlet.context-path=/
spring.application.name=iam_service

jwt.secret=${JWT_SECRET}
jwt.expiration=103600000

spring.datasource.url=jdbc:postgresql://SG-post-hub-db-7727-pgsql-master.servers.mongodirector.com:5432/postgres
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=v1_iam_service
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.schemas=v1_iam_service
spring.flyway.locations=classpath:db/migration

kafka.enabled=true
spring.kafka.bootstrap-servers=kafka:9092
additional.kafka.topic.iam.service.logs=iam-service-logs

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.cloud.consul.enabled=false
spring.cloud.consul.discovery.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false